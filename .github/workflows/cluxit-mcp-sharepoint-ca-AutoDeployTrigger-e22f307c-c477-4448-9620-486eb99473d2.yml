name: Trigger auto deployment for cluxit-mcp-sharepoint-ca

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/cluxit-mcp-sharepoint-ca-AutoDeployTrigger-e22f307c-c477-4448-9620-486eb99473d2.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CLUXITMCPSHAREPOINTCA_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CLUXITMCPSHAREPOINTCA_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CLUXITMCPSHAREPOINTCA_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: cluxitregistry.azurecr.io
          registryUsername: ${{ secrets.CLUXITMCPSHAREPOINTCA_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CLUXITMCPSHAREPOINTCA_REGISTRY_PASSWORD }}
          containerAppName: cluxit-mcp-sharepoint-ca
          resourceGroup: AI
          imageToBuild: cluxitregistry.azurecr.io/cluxit-mcp-sharepoint-ca:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


